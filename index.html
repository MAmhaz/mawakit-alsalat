<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مواقيت الصلاة - لبنان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Reem+Kufi&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#f9f7f2">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f9f7f2;
            --card-bg: #ffffff;
            --primary: #3e2c1c;
            --gold: #b49450;
            --gold-light: #d4af37;
            --text: #3b2e1e;
            --text-soft: #7a6a5c;
            --border: #e5d9cc;
            --shadow: 0 6px 20px rgba(0,0,0,0.05);
            --next-bg: #3e2c1c;
            --next-text: #f9f7f2;
            --radius: 1rem;
            --transition: 0.25s ease;
        }

        [data-theme="dark"] {
            --bg: #1e1b18;
            --card-bg: #2a2520;
            --primary: #d4af37;
            --gold: #c9a040;
            --gold-light: #e0b84c;
            --text: #e5d9cc;
            --text-soft: #b0a090;
            --border: #3e362e;
            --shadow: 0 6px 20px rgba(0,0,0,0.3);
            --next-bg: #d4af37;
            --next-text: #1e1b18;
        }

        body {
            touch-action: pan-y;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            max-width: 30.5rem;
            margin: 0 auto;
            padding: 1rem;
        }

        .app-container::-webkit-scrollbar { width: 4px; }
        .app-container::-webkit-scrollbar-track { background: transparent; }
        .app-container::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .top-title {
            flex: 1;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        .top-subtitle {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-soft);
            margin-top: 0.3rem;
            letter-spacing: 2;
        }

        .icon-btn {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--primary);
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }

        .icon-btn:hover {
            color: white;
            background: var(--gold);
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(180, 148, 80, 0.3);
        }

        .hero {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 0.8rem 1rem;
            text-align: center;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
        }

        .hero-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.3rem;
        }

        .hero-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            flex: 1;
        }

        .gregorian {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
        }

        .day-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gold);
        }

        .hijri {
            font-size: 0.9rem;
            color: var(--text-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .city-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            background: rgba(180, 148, 80, 0.1);
            color: var(--gold);
            padding: 0.2rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 700;
            border: 1px solid rgba(180, 148, 80, 0.2);
            cursor: pointer;
        }

        .date-nav-btn {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: var(--primary);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .date-nav-btn:hover {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        .next-prayer-bar {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .next-prayer-bar::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
        }

        .next-prayer-info {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .next-prayer-label {
            font-size: 0.9rem;
            color: var(--text-soft);
        }

        .next-prayer-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gold);
        }

        .next-prayer-countdown {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gold);
            direction: ltr;
            text-shadow: 0 0 8px rgba(180, 148, 80, 0.4);
        }

        .imsak {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 0.8rem 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .imsak::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
        }

        .imsak-label {
            font-size: 1rem;
            color: var(--text-soft);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 0.3rem;
        }

        .imsak-time {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold);
            direction: ltr;
        }

        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.6rem;
            margin-bottom: 1.2rem;
        }

        .prayer-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 0.9rem 0.3rem;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .prayer-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
        }

        .prayer-card.next {
            background: var(--next-bg);
            border-color: var(--next-bg);
            color: var(--next-text);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }

        .prayer-card.next .prayer-name,
        .prayer-card.next .prayer-time {
            color: var(--next-text);
        }

        .prayer-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-soft);
            margin-bottom: 0.2rem;
        }

        .prayer-time {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            direction: ltr;
        }

        .share-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .share-section::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
        }

        .share-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.8rem;
            background: transparent;
            border: 1px dashed var(--gold);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            color: var(--gold);
            transition: all var(--transition);
        }

        .share-btn:hover {
            background: rgba(180, 148, 80, 0.1);
            border-style: solid;
        }

        .share-btn-title {
            font-size: 1rem;
            font-weight: 700;
        }

        .share-btn-subtitle {
            font-size: 0.75rem;
            color: var(--text-soft);
        }

        .error-msg {
            background: #fff5f5;
            color: #b91c1c;
            padding: 0.8rem;
            border-radius: 0.6rem;
            text-align: center;
            margin-bottom: 0.8rem;
            border: 1px solid #fecaca;
            font-size: 0.7rem;
        }
        [data-theme="dark"] .error-msg {
            background: #3b1e1e;
            color: #fecaca;
            border-color: #7f1d1d;
        }

        .dev-footer {
            text-align: center;
            margin-top: 0.4rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold);
        }
        .dev-link {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--gold);
            font-weight: 700;
            text-decoration: none;
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        .dev-link:hover {
            color: var(--gold);
            border-color: var(--gold);
        }

        .typing-text {
            display: inline-block;
            color: var(--gold);
            font-weight: 700;
            border-left: 2px solid var(--gold);
            padding-left: 0.3rem;
            animation: cursor-blink 0.8s infinite;
        }

        @keyframes cursor-blink {
            0%, 100% { border-color: var(--gold); }
            50% { border-color: transparent; }
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 20rem;
            height: 100%;
            background: var(--card-bg);
            z-index: 1000;
            transition: right 0.3s ease;
            padding: 3rem 1.2rem;
            box-shadow: -10px 0 25px rgba(0,0,0,0.15);
            border-left: 1px solid var(--border);
            overflow-y: auto;
        }
        .sidebar.open { right: 0; }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            opacity: 0; visibility: hidden;
            transition: all 0.3s;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        .sidebar-title {
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 1rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid var(--border);
            font-weight: 700;
        }

        .city-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .city-item {
            padding: 0.6rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text);
            border: 1px solid transparent;
        }
        .city-item:hover,
        .city-item.active {
            background: rgba(180,148,80,0.1);
            color: var(--gold);
            border-color: rgba(180,148,80,0.3);
            transform: translateX(-4px);
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; visibility: hidden;
            transition: all 0.3s;
        }
        .modal.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            width: 90%;
            max-width: 25rem;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            position: relative;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            margin-bottom: 1rem;
        }

        .modal-options {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.7rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all var(--transition);
            background: var(--card-bg);
            color: var(--text);
        }

        .modal-btn.primary {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        .modal-btn:hover {
            opacity: 0.9;
        }

        .modal-section {
            margin-bottom: 1rem;
        }

        .modal-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-soft);
            margin-bottom: 0.4rem;
        }

        .date-picker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .date-picker-display {
            flex: 1;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            padding: 0.5rem;
            background: var(--bg);
            border-radius: 0.5rem;
            border: 1px solid var(--border);
        }

        .city-checkboxes {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            max-height: 18rem;
            overflow-y: auto;
        }

        .city-checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--text);
        }

        .city-checkbox-item input {
            accent-color: var(--gold);
            width: 1rem;
            height: 1rem;
        }

        .modal-close {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-soft);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            background: var(--gold);
            color: white;
            border: 1px solid var(--gold);
            cursor: pointer;
            font-family: 'Cairo', 'Tajawal', 'Segoe UI', 'Arial', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            white-space: nowrap;
        }

        .download-btn:hover {
            background: var(--card-bg);
            color: var(--gold);
            border-color: var(--gold);
        }

        .download-modal-content {
            text-align: center;
            max-width: 20rem;
        }

        .download-modal-text {
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .download-modal-buttons {
            display: flex;
            gap: 0.5rem;
        }

        @media (max-width: 28rem) {
            .prayer-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .top-title {
                font-size: 0.85rem;
            }
            .hero {
                padding: 0.6rem 0.7rem;
            }
            .hero-center {
                gap: 0.2rem;
            }
            .gregorian {
                font-size: 0.8rem;
            }
            .hijri {
                font-size: 0.7rem;
            }
            .city-badge {
                font-size: 0.7rem;
                padding: 0.15rem 0.6rem;
            }
            .date-nav-btn {
                width: 1.7rem;
                height: 1.7rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body data-theme="light">
    <div class="app-container">
        <div class="top-bar">
            <button class="icon-btn" id="themeToggle" aria-label="تغيير المظهر">🌙</button>
            <div class="top-title">
                <div>مواقيت الصلاة - لبنان</div>
                <div class="top-subtitle">طبقاً لرأي سماحة السيد علي الخامنئي (رض)</div>
            </div>
            <span class="download-btn" id="downloadBtn">تحميل التطبيق</span>
        </div>

        <div class="overlay" id="overlay"></div>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-title">اختر المدينة</div>
            <div class="city-list" id="cityList"></div>
        </div>

        <div class="modal" id="downloadModal">
            <div class="modal-content download-modal-content">
                <button class="modal-close" id="closeDownloadModalBtn">✕</button>
                <div class="modal-title">تحميل التطبيق</div>
                <div class="download-modal-text">
                    التطبيق مخصص لأجهزة أندرويد<br>
                    حجم التطبيق صغير جداً (500 كيلوبايت)
                </div>
                <div class="download-modal-buttons">
                    <button class="modal-btn" id="cancelDownloadBtn">إلغاء</button>
                    <a href="https://github.com/MAmhaz/mawakit-alsalat/raw/refs/heads/main/mawakit.apk" class="modal-btn primary" id="confirmDownloadBtn" download style="text-decoration:none;text-align:center;">تحميل</a>
                </div>
            </div>
        </div>

        <div class="modal" id="shareModal">
            <div class="modal-content">
                <button class="modal-close" id="closeModalBtn">✕</button>
                <div class="modal-title" id="modalTitle">مشاركة</div>
                <div id="modalStep1">
                    <div class="modal-options">
                        <button class="modal-btn primary" id="shareAsTextBtn">📋 نص</button>
                        <button class="modal-btn" id="shareAsImageBtn">🖼️ صورة</button>
                    </div>
                </div>
                <div id="modalStep2" style="display:none;">
                    <div class="modal-section">
                        <div class="modal-label">اختر التاريخ:</div>
                        <div class="date-picker">
                            <button class="date-nav-btn" id="sharePrevDayBtn">▶</button>
                            <div class="date-picker-display" id="shareDateDisplay">--</div>
                            <button class="date-nav-btn" id="shareNextDayBtn">◀</button>
                        </div>
                        <button class="modal-btn" id="shareTodayBtn" style="width:100%;margin-top:0.4rem;">العودة لليوم</button>
                    </div>
                    <div class="modal-section">
                        <div class="modal-label" id="shareCityLabel">اختر المدن:</div>
                        <div class="city-checkboxes" id="shareCityCheckboxes"></div>
                        <button class="modal-btn" id="selectAllShareBtn" style="margin-top:0.4rem;width:100%;">تحديد الكل</button>
                    </div>
                    <button class="modal-btn primary" id="shareTextConfirmBtn" style="width:100%;">مشاركة النص</button>
                    <button class="modal-btn primary" id="shareImageConfirmBtn" style="width:100%;display:none;">مشاركة الصورة</button>
                </div>
            </div>
        </div>

        <div class="hero">
            <div class="hero-row">
                <button class="date-nav-btn" id="prevDayBtn">▶</button>
                <div class="hero-center">
                    <div class="gregorian" id="gregorianDate">--</div>
                    <div class="day-name" id="dayNameDisplay"></div>
                    <div class="hijri" id="hijriDate">--</div>
                    <div class="city-badge" id="cityNameDisplay" style="cursor:pointer;">📍 --</div>
                </div>
                <button class="date-nav-btn" id="nextDayBtn">◀</button>
            </div>
        </div>

        <div class="next-prayer-bar" id="nextPrayerBar">
            <div class="next-prayer-info">
                <span class="next-prayer-label">باقي لصلاة :     </span>
                <span class="next-prayer-name" id="nextPrayerName">--</span>
            </div>
            <div class="next-prayer-countdown" id="nextPrayerCountdown">--:--:--</div>
        </div>

        <div class="imsak">
            <div class="imsak-label">
                <span>🌙</span> الإمساك
            </div>
            <div class="imsak-time" id="imsakTime">--</div>
        </div>

        <div id="errorContainer"></div>

        <div class="prayer-grid" id="prayerGrid"></div>

        <div class="share-section">
            <button class="share-btn" id="shareBtn">
                <span class="share-btn-title">⎙ مشاركة المواقيت</span>
                <span class="share-btn-subtitle">نص ، صورة</span>
            </button>
        </div>

        <div class="dev-footer">
            <a href="https://mamhaz.blogspot.com" target="_blank" rel="noopener" class="dev-link">{ } بــرمــجـــة : <span class="typing-text" id="typingText"></span> {/}</a>
        </div>
    </div>

    <script>
        (function() {
            const CITIES = {
                'beirut': 'بيروت', 'tyre': 'صور', 'saida': 'صيدا',
                'baalbek': 'بعلبك', 'hermel': 'الهرمل', 'tripoli': 'طرابلس',
                'nabatieh-bintjbeil': 'النبطية-بنت جبيل'
            };

            const PRAYERS_ORDER = ['fajr', 'shuruq', 'dhuhr', 'asr', 'maghrib', 'isha'];
            const PRAYERS_MAP = new Map([
                ['fajr', { name: 'الصبح' }],
                ['shuruq', { name: 'الشروق' }],
                ['dhuhr', { name: 'الظهر' }],
                ['asr', { name: 'العصر' }],
                ['maghrib', { name: 'المغرب' }],
                ['isha', { name: 'العشاء' }]
            ]);

            const DATA_URL = 'https://raw.githubusercontent.com/hadinajem52/PrayerTimeApp/main/assets/prayer_times.json';
            let prayerData = null;
            let currentCity = 'beirut';
            let currentDateOffset = 0;
            let shareDateOffset = 0;
            let shareMode = 'text';
            let countdownInterval = null;
            let nextPrayerKey = null;
            const domElements = {};
            const metaThemeColor = document.querySelector('meta[name="theme-color"]');

            const developerName = "مـــنـــجـــــد أمـــهـــــز";
            const typingElement = document.getElementById('typingText');
            let charIndex = 0, isDeleting = false;

            function typeWriter() {
                if (!isDeleting) {
                    if (charIndex < developerName.length) {
                        typingElement.textContent = developerName.substring(0, ++charIndex);
                        setTimeout(typeWriter, 150);
                    } else {
                        isDeleting = true;
                        setTimeout(typeWriter, 2000);
                    }
                } else {
                    if (charIndex > 0) {
                        typingElement.textContent = developerName.substring(0, --charIndex);
                        setTimeout(typeWriter, 80);
                    } else {
                        isDeleting = false;
                        setTimeout(typeWriter, 500);
                    }
                }
            }
            typeWriter();

            function getDateWithOffset(offset) {
                const now = new Date();
                now.setDate(now.getDate() + offset);
                const d = now.getDate(), m = now.getMonth()+1, y = now.getFullYear();
                const pad = (n) => n.toString().padStart(2,'0');
                return {
                    dateStr: `${d}/${m}/${y}`,
                    dateStrPadded: `${pad(d)}/${pad(m)}/${y}`,
                    dateStrAlt: `${y}-${pad(m)}-${pad(d)}`,
                    dateStrAlt2: `${y}/${pad(m)}/${pad(d)}`,
                    isToday: offset === 0,
                    day: d, month: m, year: y
                };
            }

            function findDataForDate(cityData, dateInfo) {
                if (!Array.isArray(cityData) || cityData.length === 0) return null;
                const formats = [dateInfo.dateStr, dateInfo.dateStrPadded, dateInfo.dateStrAlt, dateInfo.dateStrAlt2];
                for (const f of formats) {
                    const found = cityData.find(day => day.date === f);
                    if (found) return found;
                }
                return null;
            }

            function timeToDate(timeStr, dateRef = null) {
                if (!timeStr || typeof timeStr !== 'string') return null;
                const parts = timeStr.split(':');
                if (parts.length < 2) return null;
                const h = parseInt(parts[0],10), m = parseInt(parts[1],10);
                if (isNaN(h) || isNaN(m)) return null;
                const now = dateRef ? new Date(dateRef) : new Date();
                return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
            }

            function formatRemaining(ms) {
                if (ms <= 0) return '00:00:00';
                const s = Math.floor(ms/1000);
                const h = Math.floor(s/3600);
                const m = Math.floor((s%3600)/60);
                const sec = s%60;
                const pad = (n) => n.toString().padStart(2,'0');
                return `${pad(h)}:${pad(m)}:${pad(sec)}`;
            }

            function findNextPrayer(times, now) {
                let next = null, min = Infinity;
                for (const key of PRAYERS_ORDER) {
                    const t = times[key];
                    if (!t) continue;
                    const d = timeToDate(t, now);
                    if (!d) continue;
                    let diff = d - now;
                    if (diff <= 0) diff += 86400000;
                    if (diff > 0 && diff < min) { min = diff; next = key; }
                }
                return next;
            }

            function getRemaining(timeStr, now) {
                const d = timeToDate(timeStr, now);
                if (!d) return 0;
                let diff = d - now;
                if (diff <= 0) diff += 86400000;
                return diff;
            }

            function fixDayName(dayName) {
                if (!dayName) return '';
                const correctNames = ['الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت', 'الأحد'];
                if (correctNames.includes(dayName)) return dayName;
                const fixes = {
                    'نينثلاا': 'الاثنين',
                    'ي نثلاا': 'الاثنين',
                    'ءاثلاثلا': 'الثلاثاء',
                    'ءاعبرلاا': 'الأربعاء',
                    'سيمخلا': 'الخميس',
                    'ةعمجلا': 'الجمعة',
                    'تبسلا': 'السبت',
                    'دحلاا': 'الأحد'
                };
                return fixes[dayName.trim()] || dayName;
            }

            function getHijriMonthName(monthNumber) {
                const hijriMonths = [
                    'محرم', 'صفر', 'ربيع الأول', 'ربيع الثاني',
                    'جمادى الأولى', 'جمادى الآخرة', 'رجب', 'شعبان',
                    'رمضان', 'شوال', 'ذو القعدة', 'ذو الحجة'
                ];
                return hijriMonths[monthNumber - 1] || '';
            }

            function getFullHijriDate(gregorianDateStr) {
                if (!gregorianDateStr) return null;
                const parts = gregorianDateStr.split('/');
                if (parts.length === 3) {
                    const d = parseInt(parts[0], 10);
                    const m = parseInt(parts[1], 10);
                    const y = parseInt(parts[2], 10);
                    
                    const hijriStart = new Date(2026, 5, 16);
                    const currentDate = new Date(y, m - 1, d);
                    let diffDays = Math.floor((currentDate - hijriStart) / (1000 * 60 * 60 * 24)) + 1;
                    
                    let hijriMonth = 1;
                    let hijriYear = 1448;
                    
                    const monthLengths = [30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29];
                    
                    while (diffDays > monthLengths[hijriMonth - 1]) {
                        diffDays -= monthLengths[hijriMonth - 1];
                        hijriMonth++;
                        if (hijriMonth > 12) {
                            hijriMonth = 1;
                            hijriYear++;
                        }
                    }
                    
                    if (diffDays >= 1 && diffDays <= 30) {
                        const monthName = getHijriMonthName(hijriMonth);
                        return `${diffDays} ${monthName} ${hijriYear}`;
                    }
                }
                return null;
            }

            function showError(msg) {
                const c = document.getElementById('errorContainer');
                if (c) c.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
            }
            function clearError() {
                const c = document.getElementById('errorContainer');
                if (c) c.innerHTML = '';
            }

            function buildCards(todayData) {
                const grid = document.getElementById('prayerGrid');
                if (!grid) return;
                grid.innerHTML = '';
                domElements.prayerCards = {};

                PRAYERS_ORDER.forEach(key => {
                    const prayer = PRAYERS_MAP.get(key);
                    const timeVal = todayData[key] || '--';

                    const card = document.createElement('div');
                    card.className = 'prayer-card';
                    card.dataset.prayerKey = key;

                    card.innerHTML = `
                        <div class="prayer-name">${prayer.name}</div>
                        <div class="prayer-time">${timeVal}</div>
                    `;
                    grid.appendChild(card);

                    domElements.prayerCards[key] = {
                        card: card,
                        timeDiv: card.querySelector('.prayer-time')
                    };
                });
            }

            function highlightNext(now) {
                const dateInfo = getDateWithOffset(currentDateOffset);
                const cityData = prayerData[currentCity];
                if (!cityData) return;
                const todayData = findDataForDate(cityData, dateInfo);
                if (!todayData) return;
                const newNext = findNextPrayer(todayData, now);

                if (nextPrayerKey && domElements.prayerCards[nextPrayerKey]) {
                    domElements.prayerCards[nextPrayerKey].card.classList.remove('next');
                }
                if (newNext && domElements.prayerCards[newNext]) {
                    domElements.prayerCards[newNext].card.classList.add('next');
                }
                nextPrayerKey = newNext;
            }

            function updateNextPrayerBar(now) {
                const dateInfo = getDateWithOffset(currentDateOffset);
                const cityData = prayerData[currentCity];
                if (!cityData) return;
                const todayData = findDataForDate(cityData, dateInfo);
                if (!todayData) return;
                const nextKey = findNextPrayer(todayData, now);
                if (!nextKey) return;
                
                const prayer = PRAYERS_MAP.get(nextKey);
                const timeVal = todayData[nextKey];
                const remainingMs = getRemaining(timeVal, now);
                
                document.getElementById('nextPrayerName').textContent = prayer.name;
                document.getElementById('nextPrayerCountdown').textContent = formatRemaining(remainingMs);
            }

            function updateStatic(todayData) {
                document.getElementById('gregorianDate').textContent = todayData.date || '--';
                document.getElementById('dayNameDisplay').textContent = fixDayName(todayData.day_name || '');
                const fullHijri = getFullHijriDate(todayData.date);
                document.getElementById('hijriDate').innerHTML = fullHijri || '--';
                document.getElementById('cityNameDisplay').textContent = `📍 ${CITIES[currentCity] || currentCity}`;
                document.getElementById('imsakTime').textContent = todayData.imsak || '--';
            }

            function updateShareDateDisplay() {
                const dateInfo = getDateWithOffset(shareDateOffset);
                const fullHijri = getFullHijriDate(dateInfo.dateStr);
                const testCity = Object.keys(CITIES)[0];
                let dayName = '';
                if (prayerData && prayerData[testCity]) {
                    const dayData = findDataForDate(prayerData[testCity], dateInfo);
                    if (dayData) dayName = fixDayName(dayData.day_name || '');
                }
                document.getElementById('shareDateDisplay').textContent = 
                    `${dayName} ${dateInfo.dateStr} ${fullHijri ? ' - ' + fullHijri : ''}`;
            }

            function fullRebuild() {
                if (!prayerData) return;
                const dateInfo = getDateWithOffset(currentDateOffset);
                const cityData = prayerData[currentCity];
                if (!cityData) { showError('بيانات المدينة غير متوفرة.'); return; }
                const todayData = findDataForDate(cityData, dateInfo);
                if (!todayData) { showError('لم يتم العثور على بيانات هذا اليوم.'); return; }
                clearError();
                updateStatic(todayData);
                buildCards(todayData);
                const now = new Date();
                highlightNext(now);
                updateNextPrayerBar(now);
            }

            function quickUpdate() {
                if (!prayerData || !prayerData[currentCity]) return;
                const now = new Date();
                highlightNext(now);
                updateNextPrayerBar(now);
            }

            function startCountdown() {
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(quickUpdate, 1000);
            }

            function buildCityList() {
                const list = document.getElementById('cityList');
                if (!list) return;
                list.innerHTML = '';
                Object.entries(CITIES).forEach(([key, name]) => {
                    const item = document.createElement('div');
                    item.className = `city-item ${currentCity === key ? 'active' : ''}`;
                    item.textContent = name;
                    item.addEventListener('click', () => {
                        if (currentCity === key) { closeSidebar(); return; }
                        currentCity = key;
                        localStorage.setItem('currentCity', key);
                        currentDateOffset = 0;
                        fullRebuild();
                        buildCityList();
                        closeSidebar();
                    });
                    list.appendChild(item);
                });
            }

            function openSidebar() {
                buildCityList();
                document.getElementById('sidebar')?.classList.add('open');
                document.getElementById('overlay')?.classList.add('active');
            }
            function closeSidebar() {
                document.getElementById('sidebar')?.classList.remove('open');
                document.getElementById('overlay')?.classList.remove('active');
            }

            function changeDate(delta) {
                currentDateOffset += delta;
                fullRebuild();
            }

            function openShareModal() {
                document.getElementById('modalStep1').style.display = 'block';
                document.getElementById('modalStep2').style.display = 'none';
                document.getElementById('shareModal').classList.add('active');
            }

            function closeShareModal() {
                document.getElementById('shareModal').classList.remove('active');
            }

            function setupShareStep2(mode) {
                shareMode = mode;
                document.getElementById('modalStep1').style.display = 'none';
                document.getElementById('modalStep2').style.display = 'block';
                shareDateOffset = 0;
                updateShareDateDisplay();
                buildShareCityCheckboxes();
                
                if (mode === 'text') {
                    document.getElementById('shareTextConfirmBtn').style.display = 'block';
                    document.getElementById('shareImageConfirmBtn').style.display = 'none';
                    document.getElementById('shareCityLabel').textContent = 'اختر المدن:';
                    document.getElementById('selectAllShareBtn').style.display = 'block';
                } else {
                    document.getElementById('shareTextConfirmBtn').style.display = 'none';
                    document.getElementById('shareImageConfirmBtn').style.display = 'block';
                    document.getElementById('shareCityLabel').textContent = 'اختر المدن:';
                    document.getElementById('selectAllShareBtn').style.display = 'none';
                }
            }

            function shareAsImage() {
                const dateStr = getSelectedShareDate();
                const cities = getSelectedShareCities();
                const parts = dateStr.split('/');
                const dateInfo = {
                    dateStr: `${parseInt(parts[0])}/${parseInt(parts[1])}/${parts[2]}`,
                    dateStrPadded: dateStr,
                    dateStrAlt: `${parts[2]}-${parts[0]}-${parts[1]}`,
                    dateStrAlt2: `${parts[2]}/${parts[0]}/${parts[1]}`
                };

                let hijriDateStr = '';
                for (const cityKey of cities) {
                    const cityData = prayerData[cityKey];
                    if (!cityData) continue;
                    const dayData = findDataForDate(cityData, dateInfo);
                    if (dayData) {
                        const hijri = getFullHijriDate(dayData.date);
                        if (hijri) { hijriDateStr = hijri; break; }
                    }
                }

                const shareDateInfo = getDateWithOffset(shareDateOffset);
                const testCity = Object.keys(CITIES)[0];
                let dayName = '';
                if (prayerData && prayerData[testCity]) {
                    const dayData = findDataForDate(prayerData[testCity], shareDateInfo);
                    if (dayData) dayName = fixDayName(dayData.day_name || '');
                }

                let dayLabel = `ليوم ${dayName}`;
                if (shareDateOffset === 1) {
                    dayLabel = `ليوم غد ${dayName}`;
                } else if (shareDateOffset === 0) {
                    dayLabel = `اليوم ${dayName}`;
                }

                let lines = [];
                lines.push(`🕌 مواقيت الصلاة - ${dayLabel}`);
                lines.push(`📜 طبقاً لرأي السيد علي الخامنئي (رض)`);
                lines.push(`📅 ${dateInfo.dateStr} - 🌙 ${hijriDateStr || '--'}`);
                lines.push('');

                cities.forEach(cityKey => {
                    const cityData = prayerData[cityKey];
                    if (!cityData) return;
                    const dayData = findDataForDate(cityData, dateInfo);
                    if (!dayData) return;
                    const cityName = CITIES[cityKey] || cityKey;
                    lines.push(`#${cityName}`);
                    lines.push(`⏰ الإمساك: ${dayData.imsak || '--'}`);
                    const line1 = [];
                    const line2 = [];
                    PRAYERS_ORDER.forEach((key, index) => {
                        const prayer = PRAYERS_MAP.get(key);
                        const time = dayData[key] || '--';
                        if (index < 3) {
                            line1.push(`${prayer.name}: ${time}`);
                        } else {
                            line2.push(`${prayer.name}: ${time}`);
                        }
                    });
                    lines.push(line1.join(' ، '));
                    lines.push(line2.join(' ، '));
                    lines.push('');
                });

                lines.push(`📱 برنامج مواقيت الصلاة - برمجة : منجد أمهز`);
                lines.push(`🌐 رابط: https://mamhaz.github.io/mawakit-alsalat/`);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 500;
                const lineHeight = 28;
                canvas.height = 50 + lines.length * lineHeight + 20;
                
                const bgColor = getComputedStyle(document.body).getPropertyValue('--bg').trim() || '#f9f7f2';
                const goldColor = getComputedStyle(document.body).getPropertyValue('--gold').trim() || '#b49450';
                const textColor = getComputedStyle(document.body).getPropertyValue('--text').trim() || '#3b2e1e';
                
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = goldColor;
                ctx.fillRect(0, 0, canvas.width, 3);
                
                function drawIslamicStar(ctx, x, y, size, color) {
                    ctx.fillStyle = color;
                    ctx.font = `${size}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('✧', x, y);
                }
                
                const cornerSize = 24;
                const margin = 20;
                drawIslamicStar(ctx, margin, margin, cornerSize, goldColor);
                drawIslamicStar(ctx, canvas.width - margin, margin, cornerSize, goldColor);
                drawIslamicStar(ctx, margin, canvas.height - margin, cornerSize, goldColor);
                drawIslamicStar(ctx, canvas.width - margin, canvas.height - margin, cornerSize, goldColor);
                
                const spacingY = 350;
                const spacingX = 250;
                const startY = 200;
                const startX = 120;
                const mosquesCountY = Math.floor(canvas.height / spacingY) + 1;
                const mosquesCountX = Math.floor(canvas.width / spacingX) + 1;

                for (let row = 0; row < mosquesCountY; row++) {
                    for (let col = 0; col < mosquesCountX; col++) {
                        ctx.save();
                        ctx.globalAlpha = 0.08;
                        ctx.translate(startX + col * spacingX, startY + row * spacingY);
                        ctx.rotate(-15 * Math.PI / 180);
                        ctx.font = '120px serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = goldColor;
                        ctx.fillText('🕌', 0, 0);
                        ctx.restore();
                    }
                }
                
                ctx.fillStyle = textColor;
                ctx.font = 'bold 16px Cairo, sans-serif';
                ctx.direction = 'rtl';
                ctx.textAlign = 'right';
                const textStartX = canvas.width - 30;
                
                lines.forEach((line, i) => {
                    ctx.fillText(line, textStartX, 50 + i * lineHeight);
                });
                
                canvas.toBlob(blob => {
                    if (navigator.share) {
                        const file = new File([blob], 'prayer-times.png', { type: 'image/png' });
                        navigator.share({ files: [file], title: 'مواقيت الصلاة' }).catch(() => {});
                    } else {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'مواقيت-الصلاة.png';
                        a.click();
                        URL.revokeObjectURL(url);
                    }
                }, 'image/png');
                
                closeShareModal();
            }

            function buildShareCityCheckboxes() {
                const container = document.getElementById('shareCityCheckboxes');
                if (!container) return;
                container.innerHTML = '';
                Object.entries(CITIES).forEach(([key, name]) => {
                    const div = document.createElement('div');
                    div.className = 'city-checkbox-item';
                    div.innerHTML = `
                        <input type="checkbox" value="${key}" id="share_city_${key}" checked>
                        <label for="share_city_${key}">${name}</label>
                    `;
                    container.appendChild(div);
                });

                if (shareMode === 'image') {
                    document.querySelectorAll('#shareCityCheckboxes input[type="checkbox"]').forEach(cb => {
                        cb.addEventListener('change', function() {
                            const checked = document.querySelectorAll('#shareCityCheckboxes input[type="checkbox"]:checked');
                            if (checked.length > 2) {
                                this.checked = false;
                                showError('يمكن اختيار مدينتين فقط للصورة');
                                setTimeout(clearError, 2000);
                            }
                        });
                    });
                }
            }

            function getSelectedShareCities() {
                const checkboxes = document.querySelectorAll('#shareCityCheckboxes input[type="checkbox"]');
                const selected = [];
                checkboxes.forEach(cb => { if (cb.checked) selected.push(cb.value); });
                return selected.length > 0 ? selected : ['beirut'];
            }

            function getSelectedShareDate() {
                const dateInfo = getDateWithOffset(shareDateOffset);
                return dateInfo.dateStrPadded;
            }

            function shareTextFromModal() {
                const dateStr = getSelectedShareDate();
                const cities = getSelectedShareCities();
                const parts = dateStr.split('/');
                const dateInfo = {
                    dateStr: `${parseInt(parts[0])}/${parseInt(parts[1])}/${parts[2]}`,
                    dateStrPadded: dateStr,
                    dateStrAlt: `${parts[2]}-${parts[0]}-${parts[1]}`,
                    dateStrAlt2: `${parts[2]}/${parts[0]}/${parts[1]}`
                };

                let hijriDateStr = '';
                for (const cityKey of cities) {
                    const cityData = prayerData[cityKey];
                    if (!cityData) continue;
                    const dayData = findDataForDate(cityData, dateInfo);
                    if (dayData) {
                        const hijri = getFullHijriDate(dayData.date);
                        if (hijri) { hijriDateStr = hijri; break; }
                    }
                }

                const shareDateInfo = getDateWithOffset(shareDateOffset);
                const testCity = Object.keys(CITIES)[0];
                let dayName = '';
                if (prayerData && prayerData[testCity]) {
                    const dayData = findDataForDate(prayerData[testCity], shareDateInfo);
                    if (dayData) dayName = fixDayName(dayData.day_name || '');
                }

                let dayLabel = `ليوم ${dayName}`;
                if (shareDateOffset === 1) {
                    dayLabel = `ليوم غد ${dayName}`;
                } else if (shareDateOffset === 0) {
                    dayLabel = `اليوم ${dayName}`;
                }

                let fullText = `🕌 مواقيت الصلاة - ${dayLabel}\n`;
                fullText += `📜 طبقاً لرأي السيد علي الخامنئي (رض)\n`;
                fullText += `📅 ${dateInfo.dateStr} - 🌙 ${hijriDateStr || '--'}\n\n`;

                cities.forEach(cityKey => {
                    const cityData = prayerData[cityKey];
                    if (!cityData) return;
                    const dayData = findDataForDate(cityData, dateInfo);
                    if (!dayData) return;
                    const cityName = CITIES[cityKey] || cityKey;
                    fullText += `#${cityName}\n`;
                    fullText += `⏰ الإمساك: ${dayData.imsak || '--'}\n`;
                    const line1 = [];
                    const line2 = [];
                    PRAYERS_ORDER.forEach((key, index) => {
                        const prayer = PRAYERS_MAP.get(key);
                        const time = dayData[key] || '--';
                        if (index < 3) {
                            line1.push(`${prayer.name}: ${time}`);
                        } else {
                            line2.push(`${prayer.name}: ${time}`);
                        }
                    });
                    fullText += line1.join(' ، ') + '\n';
                    fullText += line2.join(' ، ') + '\n';
                    fullText += '\n';
                });

                fullText += `📱 برنامج مواقيت الصلاة - برمجة : منجد أمهز\n`;
                fullText += `🌐 رابط: https://mamhaz.github.io/mawakit-alsalat/`;

                if (navigator.share) {
                    navigator.share({ text: fullText }).catch(() => {});
                } else {
                    navigator.clipboard.writeText(fullText).then(() => {
                        showError('تم نسخ النص للمشاركة');
                        setTimeout(clearError, 2000);
                    });
                }
                closeShareModal();
            }

            function openDownloadModal() {
                document.getElementById('downloadModal').classList.add('active');
            }

            function closeDownloadModal() {
                document.getElementById('downloadModal').classList.remove('active');
            }

            function initTheme() {
                const saved = localStorage.getItem('theme') || 'light';
                document.body.setAttribute('data-theme', saved);
                updateThemeIcon(saved);
            }

            function updateThemeIcon(theme) {
                const btn = document.getElementById('themeToggle');
                if (!btn) return;
                btn.textContent = theme === 'dark' ? '☀️' : '🌙';
                if (metaThemeColor) {
                    metaThemeColor.setAttribute('content', theme === 'dark' ? '#1e1b18' : '#f9f7f2');
                }
            }

            function toggleTheme() {
                const newTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                document.body.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            }

            async function loadData() {
                try {
                    showError('جاري التحميل...');
                    const res = await fetch(DATA_URL);
                    if (!res.ok) throw new Error(`خطأ ${res.status}`);
                    prayerData = await res.json();
                    if (!prayerData || typeof prayerData !== 'object') throw new Error('بيانات غير صالحة');
                    clearError();
                    const savedCity = localStorage.getItem('currentCity');
                    if (savedCity && CITIES[savedCity]) {
                        currentCity = savedCity;
                    }
                    currentDateOffset = 0;
                    fullRebuild();
                    buildCityList();
                    startCountdown();
                } catch(e) {
                    console.error(e);
                    showError('تعذر تحميل المواقيت. تأكد من الاتصال.');
                    prayerData = null;
                }
            }

            document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
            document.getElementById('cityNameDisplay')?.addEventListener('click', openSidebar);
            document.getElementById('overlay')?.addEventListener('click', closeSidebar);
            document.getElementById('prevDayBtn')?.addEventListener('click', () => changeDate(-1));
            document.getElementById('nextDayBtn')?.addEventListener('click', () => changeDate(1));
            document.getElementById('shareBtn')?.addEventListener('click', openShareModal);
            document.getElementById('closeModalBtn')?.addEventListener('click', closeShareModal);
            document.getElementById('shareAsImageBtn')?.addEventListener('click', () => setupShareStep2('image'));
            document.getElementById('shareAsTextBtn')?.addEventListener('click', () => setupShareStep2('text'));
            function isDateAvailable(offset) {
                const testDate = getDateWithOffset(offset);
                const testCity = Object.keys(CITIES)[0];
                return prayerData && prayerData[testCity] && findDataForDate(prayerData[testCity], testDate);
            }

            document.getElementById('sharePrevDayBtn')?.addEventListener('click', () => {
                if (isDateAvailable(shareDateOffset - 1)) {
                    shareDateOffset--;
                    updateShareDateDisplay();
                }
            });

            document.getElementById('shareNextDayBtn')?.addEventListener('click', () => {
                if (isDateAvailable(shareDateOffset + 1)) {
                    shareDateOffset++;
                    updateShareDateDisplay();
                }
            });

            document.getElementById('shareTodayBtn')?.addEventListener('click', () => {
                shareDateOffset = 0;
                updateShareDateDisplay();
            });
            document.getElementById('shareTextConfirmBtn')?.addEventListener('click', shareTextFromModal);
            document.getElementById('shareImageConfirmBtn')?.addEventListener('click', shareAsImage);
            document.getElementById('selectAllShareBtn')?.addEventListener('click', () => {
                document.querySelectorAll('#shareCityCheckboxes input[type="checkbox"]').forEach(cb => cb.checked = true);
            });
            document.getElementById('downloadBtn')?.addEventListener('click', openDownloadModal);
            document.getElementById('closeDownloadModalBtn')?.addEventListener('click', closeDownloadModal);
            document.getElementById('cancelDownloadBtn')?.addEventListener('click', closeDownloadModal);
            document.getElementById('confirmDownloadBtn')?.addEventListener('click', closeDownloadModal);

            initTheme();
            loadData();

            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (localStorage.getItem('theme') === null) {
                    const newTheme = e.matches ? 'dark' : 'light';
                    document.body.setAttribute('data-theme', newTheme);
                    updateThemeIcon(newTheme);
                }
            });
        })();
    </script>
</body>
</html>
